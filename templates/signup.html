<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        *{
            background-color: rgb(248, 245, 188);
        }
        h1{
            margin-left: 500px;
            margin-top: 150px;
        }

        form{
            margin-left: 510px;
            margin-top: 30px;
        }

        input#user{
            border-radius: 10px;
            height: 15px;
            padding: 5px;
        }
        
        input#pass{
            border-radius: 10px;
            height: 15px;
            padding: 5px;
        }
        
        input#conf_pass{
            border-radius: 10px;
            height: 15px;
            padding: 5px;
        }

        button{
            width: 176px;
        }

        p{
            margin-left: 510px;
        }

    </style>
</head>
<body>
    <h1>Enter Your Details</h1>
    <form id="form" method="POST">
        <input id="user" type="text" name="username" placeholder="Username" required><br><br>
        <input id="pass" type="text" name="password" placeholder="Enter The Password" required><br><br>
        <input id="conf_pass" type="text" name="confirm_password" placeholder="Confirm Your Password" required><br><br>

        <button type="submit">Sign Up</button>
    </form>
    <p>Already a User?<a href="{{ url_for('login') }}">Login</a></p>

</body>
</html>
